<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wirbel</title>
    <script src="https://unpkg.com/@strudel/repl@1.3.0"></script>
  <script type="module" crossorigin src="/assets/index-dBT8t6_x.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DYVlCtp5.css">
</head>

<body>
    <h2>Generator</h2>
    <div class="generator-controls">
        <div class="row">
            <label>Sounds:</label>
            <input type="number" id="numberOfSoundsLower" min="2" value="2" />
            <span>to</span>
            <input type="number" id="numberOfSoundsUpper" min="2" value="4" />
        </div>
        <div class="row">
            <label>Length:</label>
            <input type="number" id="patternLengthLower" min="2" value="4" />
            <span>to</span>
            <input type="number" id="patternLengthUpper" min="2" value="8" />
        </div>
        <button id="generate-button">🎲 Generate new pattern</button>
    </div>
    <div id="mutations" style="display:none">
        <h2>Mutations</h2>
        <div id="mutationButtons"></div>
    </div>
    <h2>Patterns</h2>
    <h3 id="currentVersion">Current pattern</h3>
    <p id="chosenSounds">Chosen sounds: </p>
    <div id="repl-container">
        <button data-action="replStart" data-index="0">▶️ Play</button>
        <button data-action="replStop" data-index="0">⏸️ Stop</button>
        <strudel-editor id="currentSong">
            <!-- // Press the button 🎲 Generate new pattern -->
        </strudel-editor>

    </div>
    <div id="mutationHistory">
        <div id="patternMinusOne" style="display: none;">
            <h3 id="versionMinusOne">Previous pattern</h3>
            <button data-action="replStart" data-index="1">▶️ Play</button>
            <button data-action="replStop" data-index="1">⏸️ Stop</button>
            <button data-action="restorePreviousSong" data-index="1">Restore this</button>
            <strudel-editor id="songMinusOne">
                <!-- // Previous pattern will appear here -->
            </strudel-editor>

        </div>
        <div id="patternMinusTwo" style="display: none;">
            <h3 id="versionMinusTwo">Previous pattern</h3>
            <button data-action="replStart" data-index="2">▶️ Play</button>
            <button data-action="replStop" data-index="2">⏸️ Stop</button>
            <button data-action="restorePreviousSong" data-index="2">Restore this</button>
            <strudel-editor id="songMinusTwo">
                <!-- // Previous pattern will appear here -->
            </strudel-editor>

        </div>
        <div id="patternMinusThree" style="display: none;">
            <h3 id="versionMinusThree">Previous pattern</h3>
            <button data-action="replStart" data-index="3">▶️ Play</button>
            <button data-action="replStop" data-index="3">⏸️ Stop</button>
            <button data-action="restorePreviousSong" data-index="3">Restore this</button>
            <strudel-editor id="songMinusThree">
                <!-- // Previous pattern will appear here -->
            </strudel-editor>

        </div>
    </div>
</body>

</html>
